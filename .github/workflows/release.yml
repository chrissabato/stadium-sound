name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --repo ${{ github.repository }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional — omit for unsigned builds)
          # CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  build-companion-module:
    needs: create-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion-module
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.20
      - run: npm install
      - run: npm run package
      # companion-module-build names the archive from manifest.json's own
      # version (independent of the app's version), so the release asset
      # name is fixed instead, giving a stable releases/latest/download URL
      # for the website link regardless of module version bumps.
      - run: mv stadium-sound-*.tgz Stadium-Sound-Companion-Module.tgz
      - run: gh release upload ${{ github.ref_name }} Stadium-Sound-Companion-Module.tgz --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-website-version:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update version and release date on website
        run: |
          sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+/${{ github.ref_name }}/g" docs/index.html
          sed -i -E "s/[A-Z][a-z]{2} [0-9]{1,2}, [0-9]{4}/$(date -u +'%b %-d, %Y')/g" docs/index.html
      # docs/changelog.html is generated from src/renderer/src/changelog.ts
      # (the in-app What's New data) — the bump commit on main already
      # contains this release's entry.
      - name: Regenerate website changelog page
        run: node scripts/build-changelog-page.mjs
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No version change to commit"
            exit 0
          fi
          git add docs/index.html docs/changelog.html
          git commit -m "chore: update website version to ${{ github.ref_name }}"
          git push
      # A GITHUB_TOKEN push does not trigger other workflows (GitHub's
      # anti-recursion protection), so the Pages push-trigger above never
      # fires for this commit. Dispatch it explicitly instead.
      - name: Trigger Pages deploy
        run: gh workflow run pages.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
